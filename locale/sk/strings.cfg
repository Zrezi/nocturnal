[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Mod trvalej noci s vylepšeniami osvetlenia pre hráča, jeho zbrane, vozidlá, stroje a prostredie. Obsahuje množstvo nastavení na prispôsobenie vlastného zážitku.

[mod-setting-name]
noct-disable-nightvision=Zakázať nočné videnie
noct-turn-toward-target=Otočiť sa k cieľu
noct-hide-enemies-from-map=Skryť nepriateľov na mape
noct-default-lamp-color=Predvolená farba lampy
noct-player-halo=Reflektor hráča
noct-vehicle-halo=Reflektory vozidiel
noct-enhance-machines=Vylepšiť stroje
noct-enhance-explosions=Vylepšiť explózie
noct-explosion-light-scale=Mierka svetla výbuchov
noct-enhance-projectiles=Vylepšiť projektily
noct-enhance-labs=Vylepšiť laboratóriá
noct-enhance-fires=Vylepšiť oheň
noct-fire-spread-rate=Násobiteľ šírenia ohňa

[mod-setting-description]
noct-disable-nightvision=Spôsobí, že nočné videnie nebude mať žiadny účinok.
noct-turn-toward-target=Ak je povolené, hráč sa pri státí automaticky otáča smerom na zvýraznené objekty.
noct-player-halo=K hráčovi je pripojený reflektor, ktorý poskytuje dodatočnú viditeľnosť.
noct-vehicle-halo=Podobne vozidlá vydávajú svetlo.
noct-enhance-machines=Zlepšuje osvetlenie ropných rafinérií, hút, elektrických závodov a ďalších.
noct-enhance-explosions=Zlepšuje osvetlenie výbuchov zbraní a pri ničení budov.
noct-explosion-light-scale=Škáluje veľkosť svetla výbuchov (0,5x až 3,0x).
noct-enhance-projectiles=Pridáva stopy striel a žiarivé efekty projektilom a strelivu.
noct-enhance-labs=Pridáva svetlá do laboratórií počas výskumu.
noct-enhance-fires=Zlepšuje jas a správanie blikania ohňa.
noct-fire-spread-rate=Ovláda, ako rýchlo sa šíri oheň (0,1x až 3,0x).

[string-mod-setting]
noct-player-halo-off=Vypnuté
noct-player-halo-dark=Tmavé
noct-player-halo-bright=Jasné
noct-vehicle-halo-off=Vypnuté
noct-vehicle-halo-dark=Tmavé
noct-vehicle-halo-bright=Jasné

[controls]
noct-flashlight-toggle=Zap./Vyp. baterku