[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Pysyvä yö -modi, joka parantaa valaistusta pelaajaan, heidän aseisiinsa, ajoneuvoihinsa, koneisiinsa ja ympäristöön. Sisältää paljon asetuksia oman kokemuksen muokkaamiseen.

[mod-setting-name]
noct-disable-nightvision=Poista yönäkö käytöstä
noct-turn-toward-target=Käänny kohdetta kohti
noct-hide-enemies-from-map=Piilota viholliset kartalta
noct-default-lamp-color=Oletuslampun väri
noct-player-halo=Pelaajan valokeila
noct-vehicle-halo=Ajoneuvojen valokeilat
noct-enhance-machines=Paranna koneiden valaistusta
noct-enhance-explosions=Paranna räjähdysten valaistusta
noct-explosion-light-scale=Räjähdysvalon skaala
noct-enhance-projectiles=Paranna ammuksia
noct-enhance-labs=Paranna laboratorioita
noct-enhance-fires=Paranna tulipaloja
noct-fire-spread-rate=Tulipalojen leviämiskerroin

[mod-setting-description]
noct-disable-nightvision=Yönäkö ei vaikuta lainkaan.
noct-turn-toward-target=Kun käytössä, pelaaja kääntyy automaattisesti kohdistettujen kohteiden suuntaan ollessaan paikallaan.
noct-player-halo=Valokeila on liitetty pelaajaan ja se tarjoaa lisänäkyvyyttä.
noct-vehicle-halo=Samoin ajoneuvot tuottavat valoa.
noct-enhance-machines=Parantaa öljynjalostamojen, sulattojen, sähkömagneettisten tehtaiden ja muiden koneiden valaistusta.
noct-enhance-explosions=Parantaa aseiden räjähdysten ja rakennusten tuhoutumisen valaistusta.
noct-explosion-light-scale=Skaalaa räjähdysvalojen kokoa (0,5x–3,0x).
noct-enhance-projectiles=Lisää luotien vanat ja hehku-efektit ammuksiin ja ohjuksiin.
noct-enhance-labs=Lisää valot laboratorioihin tutkimuksen aikana.
noct-enhance-fires=Parantaa tulen kirkkautta ja välkkymiskäyttäytymistä.
noct-fire-spread-rate=Säätelee tulipalojen leviämisnopeutta (0,1x–3,0x).

[string-mod-setting]
noct-player-halo-off=Pois
noct-player-halo-dark=Tumma
noct-player-halo-bright=Kirkas
noct-vehicle-halo-off=Pois
noct-vehicle-halo-dark=Tumma
noct-vehicle-halo-bright=Kirkas

[controls]
noct-flashlight-toggle=Taskulampun päälle/pois