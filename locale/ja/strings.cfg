[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=プレイヤーやその武器、乗り物、機械、そして環境に対するライティングを改善した常時夜間化MOD。体験を自分好みに調整できる多数の設定を含みます。

[mod-setting-name]
noct-disable-nightvision=ナイトビジョンを無効化
noct-turn-toward-target=ターゲット方向を向く
noct-hide-enemies-from-map=マップから敵を非表示
noct-default-lamp-color=デフォルトのランプ色
noct-player-halo=プレイヤー用スポットライト
noct-vehicle-halo=乗り物用スポットライト
noct-enhance-machines=機械の強化
noct-enhance-explosions=爆発の強化
noct-explosion-light-scale=爆発光のスケール
noct-enhance-projectiles=弾体の強化
noct-enhance-labs=研究所の強化
noct-enhance-fires=炎の強化
noct-fire-spread-rate=延焼速度倍率

[mod-setting-description]
noct-disable-nightvision=ナイトビジョンが効果を持たなくなります。
noct-turn-toward-target=有効にすると、停止中にプレイヤーがホバー中の対象へ自動で向きを変えます。
noct-player-halo=プレイヤーにスポットライトが付き、視認性が向上します。
noct-vehicle-halo=同様に、乗り物も光を発します。
noct-enhance-machines=製油所、鋳造所、電磁プラントなどのライティングを強化します。
noct-enhance-explosions=武器の爆発や建物破壊時の光を改善します。
noct-explosion-light-scale=爆発時の光の大きさを調整します（0.5倍～3.0倍）。
noct-enhance-projectiles=弾丸の軌跡や発光エフェクトを追加します。
noct-enhance-labs=研究中の研究所にライトを追加します。
noct-enhance-fires=炎の明るさと揺らめき挙動を改善します。
noct-fire-spread-rate=炎の広がる速さを調整します（0.1倍～3.0倍）。

[string-mod-setting]
noct-player-halo-off=オフ
noct-player-halo-dark=暗い
noct-player-halo-bright=明るい
noct-vehicle-halo-off=オフ
noct-vehicle-halo-dark=暗い
noct-vehicle-halo-bright=明るい

[controls]
noct-flashlight-toggle=懐中電灯のオン/オフ切り替え