[mod-name]
nocturnal=Ночная Смена

[mod-description]
nocturnal=Перманентная ночь с улучшенной системой освещения для игрока, оружия, транспорта, механизмов и окружения. Включает множество настроек для гибкой конфигурации.

[mod-setting-name]
noct-disable-nightvision=Отключить прибор ночного видения
noct-turn-toward-target=Поворачиваться к объекту под курсором
noct-hide-enemies-from-map=Скрыть врагов c карты
noct-default-lamp-color=Цвет ламп по умолчанию
noct-player-halo=Подсветка игрока
noct-vehicle-halo=Подсветка транспорта
noct-enhance-machines=Улучшить визуал машин
noct-enhance-explosions=Улучшить визуал взрывов
noct-explosion-light-scale=Масштаб освещения взрыва
noct-enhance-projectiles=Улучшить визуал снарядов
noct-enhance-labs=Улучшить визуал лабораторий
noct-enhance-fires=Улучшить визуал огня
noct-fire-spread-rate=Множитель распространения огня

[mod-setting-description]
noct-disable-nightvision=Отключает эффект ночного видения.
noct-turn-toward-target=When enabled, the Player automatically rotates to face hovered entities when standing still.
noct-player-halo=К игроку прикрепляется слабый источник света, улучшающий видимость.
noct-vehicle-halo=транспортные средства излучают свет.
noct-enhance-machines=Улучшает освещение для нефтеперерабатывающих заводов, литейных, электромагнитных установок и других.
noct-enhance-explosions=Улучшает освещение взрывов оружия и разрушений зданий.
noct-explosion-light-scale=Изменяет размер освещения взрывов (от 0.5x до 3.0x).
noct-enhance-projectiles=Добавляет светящиеся следы и эффекты свечения для снарядов и боеприпасов.
noct-enhance-labs=Добавляет освещение лабораториям во время активных исследований.
noct-enhance-fires=Улучшает яркость огня и эффект мерцания.
noct-fire-spread-rate=Контролирует скорость распространения огня (от 0.1x до 3.0x).

[string-mod-setting]
noct-player-halo-off=Выкл
noct-player-halo-dark=Тускло
noct-player-halo-bright=Ярко
noct-vehicle-halo-off=Выкл
noct-vehicle-halo-dark=Тускло
noct-vehicle-halo-bright=Ярко

[controls]
noct-flashlight-toggle=Включить/выключить фонарик
