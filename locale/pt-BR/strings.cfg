[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Mod de noite permanente com melhorias de iluminação no jogador, suas armas, veículos, máquinas e no ambiente. Inclui várias opções para configurar sua própria experiência.

[mod-setting-name]
noct-disable-nightvision=Desativar visão noturna
noct-turn-toward-target=Virar em direção ao alvo
noct-hide-enemies-from-map=Ocultar inimigos no mapa
noct-default-lamp-color=Cor padrão da lâmpada
noct-player-halo=Holofote do jogador
noct-vehicle-halo=Holofotes de veículos
noct-enhance-machines=Melhorar máquinas
noct-enhance-explosions=Melhorar explosões
noct-explosion-light-scale=Escala da luz das explosões
noct-enhance-projectiles=Melhorar projéteis
noct-enhance-labs=Melhorar laboratórios
noct-enhance-fires=Melhorar incêndios
noct-fire-spread-rate=Multiplicador de propagação do fogo

[mod-setting-description]
noct-disable-nightvision=Faz com que a visão noturna não tenha efeito.
noct-turn-toward-target=Quando ativado, o jogador gira automaticamente para encarar entidades sob o cursor quando estiver parado.
noct-player-halo=Um holofote é acoplado ao jogador, fornecendo um pouco mais de visibilidade.
noct-vehicle-halo=Da mesma forma, veículos produzem luz.
noct-enhance-machines=Melhora a iluminação de refinarias de petróleo, fundições, plantas EM e outras.
noct-enhance-explosions=Melhora a iluminação de explosões de armas e da destruição de construções.
noct-explosion-light-scale=Escala o tamanho das luzes de explosão (0,5x a 3,0x).
noct-enhance-projectiles=Adiciona rastros de bala e efeitos de brilho a projéteis e munições.
noct-enhance-labs=Adiciona luzes aos laboratórios quando estão pesquisando ativamente.
noct-enhance-fires=Melhora o brilho do fogo e o comportamento de tremulação.
noct-fire-spread-rate=Controla a velocidade com que o fogo se espalha (0,1x a 3,0x).

[string-mod-setting]
noct-player-halo-off=Desligado
noct-player-halo-dark=Escuro
noct-player-halo-bright=Brilhante
noct-vehicle-halo-off=Desligado
noct-vehicle-halo-dark=Escuro
noct-vehicle-halo-bright=Brilhante

[controls]
noct-flashlight-toggle=Alternar lanterna (liga/desliga)