[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Permanent natt-mod med ljusförbättringar riktade mot spelaren, deras vapen, fordon, maskiner och miljön. Innehåller många inställningar för att anpassa din egen upplevelse.

[mod-setting-name]
noct-disable-nightvision=Inaktivera nattseende
noct-turn-toward-target=Vänd mot mål
noct-hide-enemies-from-map=Dölj fiender från kartan
noct-default-lamp-color=Standardlampfärg
noct-player-halo=Spelarljuskrans
noct-vehicle-halo=Fordonsljuskrans
noct-enhance-machines=Förbättra maskiner
noct-enhance-explosions=Förbättra explosioner
noct-explosion-light-scale=Explosionsljusskala
noct-enhance-projectiles=Förbättra projektiler
noct-enhance-labs=Förbättra laboratorier
noct-enhance-fires=Förbättra eld
noct-fire-spread-rate=Eldspridningsmultiplikator

[mod-setting-description]
noct-disable-nightvision=Gör så att nattseende inte har någon effekt.
noct-turn-toward-target=När aktiverad roterar spelaren automatiskt mot markerade objekt när de står stilla.
noct-player-halo=En strålkastare är kopplad till spelaren som ger extra sikt.
noct-vehicle-halo=På liknande sätt producerar fordon ljus.
noct-enhance-machines=Förbättrar belysningen för oljeraffinaderier, smältverk, EM-fabriker och mer.
noct-enhance-explosions=Förbättrar belysningen från vapens explosioner och byggnadsförstörelse.
noct-explosion-light-scale=Skalar storleken på explosionsljus (0,5x till 3,0x).
noct-enhance-projectiles=Lägger till kulspår och glödeffekter för projektiler och ammunition.
noct-enhance-labs=Lägger till ljus i laboratorier när de aktivt forskar.
noct-enhance-fires=Förbättrar eldars ljusstyrka och flimmerbeteende.
noct-fire-spread-rate=Styr hur snabbt eld sprider sig (0,1x till 3,0x).

[string-mod-setting]
noct-player-halo-off=Av
noct-player-halo-dark=Mörk
noct-player-halo-bright=Ljusstark
noct-vehicle-halo-off=Av
noct-vehicle-halo-dark=Mörk
noct-vehicle-halo-bright=Ljusstark

[controls]
noct-flashlight-toggle=Slå på/av ficklampa