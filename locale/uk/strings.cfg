[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Мод постійної ночі з покращеним освітленням гравця, його зброї, транспортних засобів, машин та навколишнього середовища. Містить багато налаштувань для створення власного ігрового досвіду.

[mod-setting-name]
noct-disable-nightvision=Вимкнути нічне бачення
noct-turn-toward-target=Поворот до цілі
noct-hide-enemies-from-map=Приховати ворогів на мапі
noct-default-lamp-color=Стандартний колір лампи
noct-player-halo=Підсвітка гравця
noct-vehicle-halo=Підсвітка транспортних засобів
noct-enhance-machines=Покращити машини
noct-enhance-explosions=Покращити вибухи
noct-explosion-light-scale=Масштаб світла вибухів
noct-enhance-projectiles=Покращити снаряди
noct-enhance-labs=Покращити лабораторії
noct-enhance-fires=Покращити вогонь
noct-fire-spread-rate=Множник поширення вогню

[mod-setting-description]
noct-disable-nightvision=Спричиняє відсутність ефекту нічного бачення.
noct-turn-toward-target=Коли увімкнено, гравець автоматично повертається до наведеної сутності, якщо стоїть на місці.
noct-player-halo=До гравця додається прожектор, що забезпечує додаткову видимість.
noct-vehicle-halo=Аналогічно, транспортні засоби випромінюють світло.
noct-enhance-machines=Покращує освітлення на нафтопереробних заводах, ливарнях, ЕМ-заводах та інших.
noct-enhance-explosions=Покращує освітлення вибухів зброї та руйнування будівель.
noct-explosion-light-scale=Масштабує розмір світла вибухів (від 0.5x до 3.0x).
noct-enhance-projectiles=Додає сліди куль і світлові ефекти для снарядів та боєприпасів.
noct-enhance-labs=Додає світло лабораторіям під час досліджень.
noct-enhance-fires=Покращує яскравість вогню та поведінку мерехтіння.
noct-fire-spread-rate=Контролює швидкість поширення вогню (від 0.1x до 3.0x).

[string-mod-setting]
noct-player-halo-off=Вимкнено
noct-player-halo-dark=Темний
noct-player-halo-bright=Яскравий
noct-vehicle-halo-off=Вимкнено
noct-vehicle-halo-dark=Темний
noct-vehicle-halo-bright=Яскравий

[controls]
noct-flashlight-toggle=Перемкнути ліхтарик увімк./вимк.