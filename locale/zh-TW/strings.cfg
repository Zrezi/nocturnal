[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=永久夜晚模組，針對玩家、武器、載具、機器與環境提供照明強化。包含大量設定以自訂你的遊戲體驗。

[mod-setting-name]
noct-disable-nightvision=停用夜視
noct-turn-toward-target=朝向目標轉向
noct-hide-enemies-from-map=在地圖上隱藏敵人
noct-default-lamp-color=預設燈光顏色
noct-player-halo=玩家聚光燈
noct-vehicle-halo=載具聚光燈
noct-enhance-machines=強化機器
noct-enhance-explosions=強化爆炸效果
noct-explosion-light-scale=爆炸光照縮放
noct-enhance-projectiles=強化投射物
noct-enhance-labs=強化實驗室
noct-enhance-fires=強化火焰
noct-fire-spread-rate=火勢蔓延倍率

[mod-setting-description]
noct-disable-nightvision=使夜視效果完全失效。
noct-turn-toward-target=啟用時，玩家在靜止時會自動轉向滑鼠指向的目標實體。
noct-player-halo=在玩家身上附加聚光燈，提供額外可視範圍。
noct-vehicle-halo=類似地，載具也會產生光源。
noct-enhance-machines=強化石油精煉廠、冶煉廠、電磁工廠等機器的照明效果。
noct-enhance-explosions=改善武器爆炸與建築物摧毀時的光照效果。
noct-explosion-light-scale=調整爆炸光源大小（0.5x 至 3.0x）。
noct-enhance-projectiles=為子彈與彈藥加入彈道軌跡與發光效果。
noct-enhance-labs=在實驗室進行研究時加入燈光效果。
noct-enhance-fires=提升火焰亮度與閃爍效果。
noct-fire-spread-rate=控制火勢蔓延速度（0.1x 至 3.0x）。

[string-mod-setting]
noct-player-halo-off=關閉
noct-player-halo-dark=暗
noct-player-halo-bright=亮
noct-vehicle-halo-off=關閉
noct-vehicle-halo-dark=暗
noct-vehicle-halo-bright=亮

[controls]
noct-flashlight-toggle=切換手電筒開啟/關閉