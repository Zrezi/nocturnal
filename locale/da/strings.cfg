[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Permanent nat-mod med lysforbedringer rettet mod spilleren, deres våben, køretøjer, maskiner og omgivelserne. Indeholder mange indstillinger til at konfigurere din egen oplevelse.

[mod-setting-name]
noct-disable-nightvision=Deaktiver nattesyn
noct-turn-toward-target=Vend mod mål
noct-hide-enemies-from-map=Skjul fjender på kortet
noct-default-lamp-color=Standard lampefarve
noct-player-halo=Spotlys på spiller
noct-vehicle-halo=Køretøjs-spotlys
noct-enhance-machines=Forbedr maskiner
noct-enhance-explosions=Forbedr eksplosioner
noct-explosion-light-scale=Eksplosionslysskala
noct-enhance-projectiles=Forbedr projektiler
noct-enhance-labs=Forbedr laboratorier
noct-enhance-fires=Forbedr ild
noct-fire-spread-rate=Ildspredningsmultiplikator

[mod-setting-description]
noct-disable-nightvision=Gør nattesyn uden effekt.
noct-turn-toward-target=Når aktiveret roterer spilleren automatisk mod fremhævede enheder, når vedkommende står stille.
noct-player-halo=Et spotlight er monteret på spilleren for at give ekstra synlighed.
noct-vehicle-halo=Tilsvarende udsender køretøjer lys.
noct-enhance-machines=Forbedrer belysningen af olie-raffinaderier, smelteovne, EM-anlæg og mere.
noct-enhance-explosions=Forbedrer belysningen ved våbeneksplosioner og ødelæggelse af bygninger.
noct-explosion-light-scale=Skalerer størrelsen på eksplosionslys (0,5x til 3,0x).
noct-enhance-projectiles=Tilføjer projektilspor og glødeffekter til projektiler og ammunition.
noct-enhance-labs=Tilføjer lys til laboratorier, når de aktivt forsker.
noct-enhance-fires=Forbedrer ildens lysstyrke og flimmeradfærd.
noct-fire-spread-rate=Styrer hvor hurtigt ild spreder sig (0,1x til 3,0x).

[string-mod-setting]
noct-player-halo-off=Fra
noct-player-halo-dark=Mørk
noct-player-halo-bright=Lys
noct-vehicle-halo-off=Fra
noct-vehicle-halo-dark=Mørk
noct-vehicle-halo-bright=Lys

[controls]
noct-flashlight-toggle=Slå lommelygte til/fra