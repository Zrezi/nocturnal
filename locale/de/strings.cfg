[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Dauerhafte Nacht-Mod mit verbesserten Lichteffekten für den Spieler, seine Waffen, Fahrzeuge, Maschinen und die Umgebung. Enthält viele Einstellungen, um das Spielerlebnis individuell anzupassen.

[mod-setting-name]
noct-disable-nightvision=Nachtsicht deaktivieren
noct-turn-toward-target=Drehe dich zum Ziel
noct-hide-enemies-from-map=Feinde auf der Karte ausblenden
noct-default-lamp-color=Standard-Lampenfarbe
noct-player-halo=Spieler im Fokus
noct-vehicle-halo=Fahrzeug im Fokus
noct-enhance-machines=Maschinen verschönern
noct-enhance-explosions=Explosionen verschönern
noct-explosion-light-scale=Explosion Lichtskala
noct-enhance-projectiles=Projektile verbessern
noct-enhance-labs=Labor verbessern
noct-enhance-fires=Feuer verstärken
noct-fire-spread-rate=Brandausbreitungsgeschwindigkeit

[mod-setting-description]
noct-disable-nightvision=Bewirkt, dass Nachtsicht keine Wirkung hat.
noct-turn-toward-target=Wenn aktiviert, dreht sich der Spieler automatisch in Richtung anvisierter Objekte, wenn er stillsteht.
noct-player-halo=Ein Scheinwerfer ist am Spieler befestigt und sorgt für zusätzliche Sichtbarkeit.
noct-vehicle-halo=Ebenso erzeugen Fahrzeuge Licht.
noct-enhance-machines=Verbessert die Beleuchtung von Ölraffinerien, Gießereien, EM-Anlagen und mehr.
noct-enhance-explosions=Verbessert die Beleuchtung von Waffenexplosionen und Gebäudzerstörungen.
noct-explosion-light-scale=Skaliert die Größe der Explosionslichter (0,5x bis 3,0x).
noct-enhance-projectiles=Fügt Geschossspuren und Leuchteffekte für Projektile und Munition hinzu.
noct-enhance-labs=Fügt Laboren Licht hinzu, wenn sie aktiv forschen.
noct-enhance-fires=Verbessert die Helligkeit und das Flackern von Feuer.
noct-fire-spread-rate=Steuert, wie schnell sich Feuer ausbreitet (0,1x bis 3,0x).

[string-mod-setting]
noct-player-halo-off=Aus
noct-player-halo-dark=Dunkel
noct-player-halo-bright=Hell
noct-vehicle-halo-off=Aus
noct-vehicle-halo-dark=Dunkel
noct-vehicle-halo-bright=Hell

[controls]
noct-flashlight-toggle=Taschenlampe ein-/ausschalten
