[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Mod de noche permanente con mejoras de iluminación enfocadas en el jugador, sus armas, vehículos, máquinas y el entorno. Incluye muchas opciones para configurar tu propia experiencia.

[mod-setting-name]
noct-disable-nightvision=Desactivar visión nocturna
noct-turn-toward-target=Girar hacia el objetivo
noct-hide-enemies-from-map=Ocultar enemigos del mapa
noct-default-lamp-color=Color de lámpara predeterminado
noct-player-halo=Foco del jugador
noct-vehicle-halo=Focos de vehículos
noct-enhance-machines=Mejorar máquinas
noct-enhance-explosions=Mejorar explosiones
noct-explosion-light-scale=Escala de luz de explosiones
noct-enhance-projectiles=Mejorar proyectiles
noct-enhance-labs=Mejorar laboratorios
noct-enhance-fires=Mejorar fuego
noct-fire-spread-rate=Multiplicador de propagación del fuego

[mod-setting-description]
noct-disable-nightvision=Hace que la visión nocturna no tenga efecto.
noct-turn-toward-target=Cuando está activado, el jugador gira automáticamente para mirar a las entidades señaladas mientras está quieto.
noct-player-halo=Se adjunta un foco al jugador que proporciona visibilidad adicional.
noct-vehicle-halo=De forma similar, los vehículos producen luz.
noct-enhance-machines=Mejora la iluminación de refinerías de petróleo, fundiciones, plantas electromagnéticas y más.
noct-enhance-explosions=Mejora la iluminación de explosiones de armas y destrucción de edificios.
noct-explosion-light-scale=Escala el tamaño de la luz de las explosiones (0.5x a 3.0x).
noct-enhance-projectiles=Añade estelas de balas y efectos de brillo a proyectiles y munición.
noct-enhance-labs=Añade luces a los laboratorios cuando están investigando activamente.
noct-enhance-fires=Mejora el brillo del fuego y su comportamiento de parpadeo.
noct-fire-spread-rate=Controla qué tan rápido se propaga el fuego (0.1x a 3.0x).

[string-mod-setting]
noct-player-halo-off=Apagado
noct-player-halo-dark=Oscuro
noct-player-halo-bright=Brillante
noct-vehicle-halo-off=Apagado
noct-vehicle-halo-dark=Oscuro
noct-vehicle-halo-bright=Brillante

[controls]
noct-flashlight-toggle=Alternar linterna Encender/Apagar