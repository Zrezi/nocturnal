[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Mod permanentnej nocy z ulepszonym oświetleniem gracza, jego broni, pojazdów, maszyn oraz otoczenia. Zawiera wiele ustawień pozwalających dostosować własne doświadczenie.

[mod-setting-name]
noct-disable-nightvision=Wyłącz noktowizję
noct-turn-toward-target=Obracaj się w stronę celu
noct-hide-enemies-from-map=Ukrywaj wrogów na mapie
noct-default-lamp-color=Domyślny kolor lampy
noct-player-halo=Oświetlenie gracza
noct-vehicle-halo=Reflektory pojazdów
noct-enhance-machines=Ulepsz oświetlenie maszyn
noct-enhance-explosions=Ulepsz eksplozje
noct-explosion-light-scale=Skala światła eksplozji
noct-enhance-projectiles=Ulepsz pociski
noct-enhance-labs=Ulepsz laboratoria
noct-enhance-fires=Ulepsz ogień
noct-fire-spread-rate=Mnożnik rozprzestrzeniania ognia

[mod-setting-description]
noct-disable-nightvision=Powoduje, że noktowizja nie działa.
noct-turn-toward-target=Gdy włączone, gracz automatycznie obraca się w stronę wskazanych obiektów, gdy stoi w miejscu.
noct-player-halo=Do gracza dołączone jest światło punktowe zapewniające lepszą widoczność.
noct-vehicle-halo=Podobnie, pojazdy emitują światło.
noct-enhance-machines=Ulepsza oświetlenie rafinerii ropy, hut, elektrowni EM i innych.
noct-enhance-explosions=Poprawia oświetlenie eksplozji broni i niszczenia budynków.
noct-explosion-light-scale=Skaluje rozmiar światła eksplozji (od 0,5x do 3,0x).
noct-enhance-projectiles=Dodaje smugi i efekty świecenia dla pocisków i amunicji.
noct-enhance-labs=Dodaje światła do laboratoriów podczas prowadzenia badań.
noct-enhance-fires=Poprawia jasność i sposób migotania ognia.
noct-fire-spread-rate=Kontroluje szybkość rozprzestrzeniania się ognia (od 0,1x do 3,0x).

[string-mod-setting]
noct-player-halo-off=Wyłączone
noct-player-halo-dark=Ciemne
noct-player-halo-bright=Jasne
noct-vehicle-halo-off=Wyłączone
noct-vehicle-halo-dark=Ciemne
noct-vehicle-halo-bright=Jasne

[controls]
noct-flashlight-toggle=Przełącz latarkę (włącz/wyłącz)