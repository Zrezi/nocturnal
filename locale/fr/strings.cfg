[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Mod de nuit permanente avec des améliorations d’éclairage centrées sur le joueur, ses armes, ses véhicules, ses machines et l’environnement. Comprend de nombreux réglages pour personnaliser votre expérience.

[mod-setting-name]
noct-disable-nightvision=Désactiver la vision nocturne
noct-turn-toward-target=Se tourner vers la cible
noct-hide-enemies-from-map=Masquer les ennemis de la carte
noct-default-lamp-color=Couleur de lampe par défaut
noct-player-halo=Projecteur du joueur
noct-vehicle-halo=Projecteurs des véhicules
noct-enhance-machines=Améliorer les machines
noct-enhance-explosions=Améliorer les explosions
noct-explosion-light-scale=Échelle de lumière des explosions
noct-enhance-projectiles=Améliorer les projectiles
noct-enhance-labs=Améliorer les laboratoires
noct-enhance-fires=Améliorer les incendies
noct-fire-spread-rate=Multiplicateur de propagation du feu

[mod-setting-description]
noct-disable-nightvision=Rend la vision nocturne sans effet.
noct-turn-toward-target=Lorsque activé, le joueur se tourne automatiquement vers les entités survolées lorsqu’il est immobile.
noct-player-halo=Un projecteur est attaché au joueur pour offrir une meilleure visibilité.
noct-vehicle-halo=De même, les véhicules produisent de la lumière.
noct-enhance-machines=Améliore l’éclairage des raffineries de pétrole, fonderies, usines EM, et plus encore.
noct-enhance-explosions=Améliore l’éclairage des explosions d’armes et de la destruction des bâtiments.
noct-explosion-light-scale=Ajuste la taille de la lumière des explosions (0.5x à 3.0x).
noct-enhance-projectiles=Ajoute des traînées et des effets lumineux aux projectiles et munitions.
noct-enhance-labs=Ajoute des lumières aux laboratoires lorsqu’ils effectuent des recherches.
noct-enhance-fires=Améliore la luminosité et le scintillement des incendies.
noct-fire-spread-rate=Contrôle la vitesse de propagation des incendies (0.1x à 3.0x).

[string-mod-setting]
noct-player-halo-off=Désactivé
noct-player-halo-dark=Sombre
noct-player-halo-bright=Lumineux
noct-vehicle-halo-off=Désactivé
noct-vehicle-halo-dark=Sombre
noct-vehicle-halo-bright=Lumineux

[controls]
noct-flashlight-toggle=Activer/Désactiver la lampe torche
