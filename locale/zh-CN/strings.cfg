[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=永久夜晚模组，并为玩家、武器、载具、机器和环境提供照明增强。包含大量设置以自定义你的体验。

[mod-setting-name]
noct-disable-nightvision=禁用夜视
noct-turn-toward-target=朝向目标转向
noct-hide-enemies-from-map=在地图上隐藏敌人
noct-default-lamp-color=默认灯光颜色
noct-player-halo=玩家聚光灯
noct-vehicle-halo=载具聚光灯
noct-enhance-machines=增强机器
noct-enhance-explosions=增强爆炸
noct-explosion-light-scale=爆炸光照缩放
noct-enhance-projectiles=增强投射物
noct-enhance-labs=增强实验室
noct-enhance-fires=增强火焰
noct-fire-spread-rate=火势蔓延倍率

[mod-setting-description]
noct-disable-nightvision=使夜视效果失效。
noct-turn-toward-target=启用后，玩家在静止时会自动转向鼠标悬停的实体。
noct-player-halo=在玩家身上附加聚光灯，提供额外的可见度。
noct-vehicle-halo=类似地，载具也会发光。
noct-enhance-machines=为炼油厂、冶炼厂、电磁工厂等增强照明。
noct-enhance-explosions=改善武器爆炸和建筑摧毁时的光照效果。
noct-explosion-light-scale=调整爆炸光照的大小（0.5x 至 3.0x）。
noct-enhance-projectiles=为子弹与弹药添加弹道轨迹和发光效果。
noct-enhance-labs=在研究进行时为实验室添加灯光。
noct-enhance-fires=提升火焰亮度与闪烁效果。
noct-fire-spread-rate=控制火势蔓延速度（0.1x 至 3.0x）。

[string-mod-setting]
noct-player-halo-off=关闭
noct-player-halo-dark=暗
noct-player-halo-bright=亮
noct-vehicle-halo-off=关闭
noct-vehicle-halo-dark=暗
noct-vehicle-halo-bright=亮

[controls]
noct-flashlight-toggle=切换手电筒开关