[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=영구적인 밤 환경 모드로, 플레이어, 무기, 차량, 기계 및 환경에 대한 조명 개선을 제공합니다. 자신만의 경험을 구성할 수 있는 다양한 설정을 포함합니다.

[mod-setting-name]
noct-disable-nightvision=야간 시야 비활성화
noct-turn-toward-target=대상 방향으로 회전
noct-hide-enemies-from-map=지도에서 적 숨기기
noct-default-lamp-color=기본 램프 색상
noct-player-halo=플레이어 스포트라이트
noct-vehicle-halo=차량 스포트라이트
noct-enhance-machines=기계 조명 개선
noct-enhance-explosions=폭발 효과 강화
noct-explosion-light-scale=폭발 조명 크기 배율
noct-enhance-projectiles=투사체 효과 강화
noct-enhance-labs=연구소 조명 개선
noct-enhance-fires=화재 효과 개선
noct-fire-spread-rate=화재 확산 배율

[mod-setting-description]
noct-disable-nightvision=야간 시야 기능이 아무 효과도 발휘하지 않게 됩니다.
noct-turn-toward-target=활성화 시, 플레이어가 정지 상태일 때 커서가 가리키는 대상 방향으로 자동 회전합니다.
noct-player-halo=플레이어에게 추가 시야를 제공하는 스포트라이트가 부착됩니다.
noct-vehicle-halo=차량에도 동일하게 조명이 생성됩니다.
noct-enhance-machines=정유 공장, 용광로, EM 플랜트 등 다양한 기계의 조명을 개선합니다.
noct-enhance-explosions=무기 폭발 및 건물 파괴 시 조명 효과를 개선합니다.
noct-explosion-light-scale=폭발 조명의 크기를 조절합니다(0.5배~3.0배).
noct-enhance-projectiles=총알 궤적과 투사체 및 탄약에 발광 효과를 추가합니다.
noct-enhance-labs=연구 중일 때 연구소에 조명을 추가합니다.
noct-enhance-fires=불꽃의 밝기와 깜빡임 효과를 개선합니다.
noct-fire-spread-rate=화재가 확산되는 속도를 조절합니다(0.1배~3.0배).

[string-mod-setting]
noct-player-halo-off=끔
noct-player-halo-dark=어두움
noct-player-halo-bright=밝음
noct-vehicle-halo-off=끔
noct-vehicle-halo-dark=어두움
noct-vehicle-halo-bright=밝음

[controls]
noct-flashlight-toggle=손전등 켜기/끄기 전환