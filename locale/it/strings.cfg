[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Mod per notte permanente con miglioramenti dell’illuminazione per il giocatore, le sue armi, i veicoli, le macchine e l’ambiente. Include molte impostazioni per configurare la propria esperienza.

[mod-setting-name]
noct-disable-nightvision=Disattiva visione notturna
noct-turn-toward-target=Ruota verso il bersaglio
noct-hide-enemies-from-map=Nascondi i nemici dalla mappa
noct-default-lamp-color=Colore predefinito della lampada
noct-player-halo=Faro del giocatore
noct-vehicle-halo=Fari dei veicoli
noct-enhance-machines=Migliora macchine
noct-enhance-explosions=Migliora esplosioni
noct-explosion-light-scale=Scala luce esplosioni
noct-enhance-projectiles=Migliora proiettili
noct-enhance-labs=Migliora laboratori
noct-enhance-fires=Migliora incendi
noct-fire-spread-rate=Moltiplicatore diffusione incendi

[mod-setting-description]
noct-disable-nightvision=Fa sì che la visione notturna non abbia alcun effetto.
noct-turn-toward-target=Quando attivato, il giocatore ruota automaticamente verso le entità sotto il cursore quando è fermo.
noct-player-halo=Un faro è attaccato al giocatore che fornisce maggiore visibilità.
noct-vehicle-halo=Analogamente, i veicoli producono luce.
noct-enhance-machines=Migliora l’illuminazione di raffinerie, fonderie, impianti EM e altro.
noct-enhance-explosions=Migliora l’illuminazione delle esplosioni delle armi e della distruzione degli edifici.
noct-explosion-light-scale=Scala le dimensioni delle luci delle esplosioni (da 0.5x a 3.0x).
noct-enhance-projectiles=Aggiunge scie luminose ed effetti di bagliore ai proiettili e alle munizioni.
noct-enhance-labs=Aggiunge luci ai laboratori quando stanno effettuando ricerche attive.
noct-enhance-fires=Migliora la luminosità e il comportamento del tremolio del fuoco.
noct-fire-spread-rate=Controlla la velocità di propagazione degli incendi (da 0.1x a 3.0x).

[string-mod-setting]
noct-player-halo-off=Spento
noct-player-halo-dark=Scuro
noct-player-halo-bright=Luminoso
noct-vehicle-halo-off=Spento
noct-vehicle-halo-dark=Scuro
noct-vehicle-halo-bright=Luminoso

[controls]
noct-flashlight-toggle=Attiva/Disattiva torcia