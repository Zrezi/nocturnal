[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Permanent night mod with lighting improvements toward the player, their weapons, vehicles, machines, and the environment. Includes lots of settings to configure your own experience.

[mod-setting-name]
noct-disable-nightvision=Disable Nightvision
noct-turn-toward-target=Turn Towards Target
noct-hide-enemies-from-map=Hide Enemies From Map
noct-default-lamp-color=Default Lamp Color
noct-player-halo=Player Spotlight
noct-vehicle-halo=Vehicle Spotlights
noct-enhance-buildings=Enhance Buildings
noct-enhance-explosions=Enhance Explosions
noct-explosion-light-scale=Explosion Light Scale
noct-enhance-projectiles=Enhance Projectiles
noct-enhance-labs=Enhance Labs
noct-enhance-fires=Enhance Fires
noct-fire-spread-rate=Fire Spread Multiplier

[mod-setting-description]
noct-disable-nightvision=Causes Nightvision to have no effect.
noct-turn-toward-target=When enabled, the Player automatically rotates to face hovered entities when standing still.
noct-player-halo=A spotlight is attached to the Player providing some extra visibility.
noct-vehicle-halo=Similarly, vehicles produce light.
noct-enhance-buildings=Enhances lighting for buildings including rocket silo launches.
noct-enhance-explosions=Improves lighting of weapon explosions and building destruction.
noct-explosion-light-scale=Scales the size of explosion lights (0.5x to 3.0x).
noct-enhance-projectiles=Adds bullet trails and glow effects to projectiles and ammo.
noct-enhance-labs=Adds flickering lights to labs when they are actively researching.
noct-enhance-fires=Improves fire brightness and flickering behavior.
noct-fire-spread-rate=Controls how quickly fires spread (0.1x to 3.0x).

[string-mod-setting]
noct-player-halo-off=Off
noct-player-halo-dark=Dark
noct-player-halo-bright=Bright
noct-vehicle-halo-off=Off
noct-vehicle-halo-dark=Dark
noct-vehicle-halo-bright=Bright

[controls]
noct-flashlight-toggle=Toggle Flashlight On/Off
