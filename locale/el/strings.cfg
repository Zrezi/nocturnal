[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Μόνιμη νύχτα mod με βελτιώσεις φωτισμού προς τον παίκτη, τα όπλα του, τα οχήματα, τις μηχανές και το περιβάλλον. Περιλαμβάνει πολλές ρυθμίσεις για να προσαρμόσετε τη δική σας εμπειρία.

[mod-setting-name]
noct-disable-nightvision=Απενεργοποίηση νυχτερινής όρασης
noct-turn-toward-target=Στροφή προς τον στόχο
noct-hide-enemies-from-map=Απόκρυψη εχθρών από τον χάρτη
noct-default-lamp-color=Προεπιλεγμένο χρώμα λαμπτήρα
noct-player-halo=Φωτεινή άλω παίκτη
noct-vehicle-halo=Φωτεινή άλω οχημάτων
noct-enhance-machines=Βελτίωση μηχανημάτων
noct-enhance-explosions=Βελτίωση εκρήξεων
noct-explosion-light-scale=Κλίμακα φωτισμού εκρήξεων
noct-enhance-projectiles=Βελτίωση βλημάτων
noct-enhance-labs=Βελτίωση εργαστηρίων
noct-enhance-fires=Βελτίωση πυρκαγιών
noct-fire-spread-rate=Ρυθμός εξάπλωσης πυρκαγιών

[mod-setting-description]
noct-disable-nightvision=Η νυχτερινή όραση δεν έχει καμία επίδραση.
noct-turn-toward-target=Όταν είναι ενεργό, ο παίκτης περιστρέφεται αυτόματα για να κοιτάζει τις επισημασμένες οντότητες όταν στέκεται ακίνητος.
noct-player-halo=Ένας προβολέας προσαρτάται στον παίκτη παρέχοντας επιπλέον ορατότητα.
noct-vehicle-halo=Ομοίως, τα οχήματα παράγουν φως.
noct-enhance-machines=Βελτιώνει τον φωτισμό διυλιστηρίων πετρελαίου, χυτηρίων, ηλεκτρομαγνητικών εργοστασίων και άλλων.
noct-enhance-explosions=Βελτιώνει τον φωτισμό εκρήξεων όπλων και καταστροφής κτιρίων.
noct-explosion-light-scale=Κλιμακώνει το μέγεθος των φώτων εκρήξεων (0.5x έως 3.0x).
noct-enhance-projectiles=Προσθέτει ίχνη σφαιρών και εφέ λάμψης σε βλήματα και πυρομαχικά.
noct-enhance-labs=Προσθέτει φώτα στα εργαστήρια όταν διεξάγεται έρευνα.
noct-enhance-fires=Βελτιώνει τη φωτεινότητα και τη συμπεριφορά τρεμοπαίγματος της φωτιάς.
noct-fire-spread-rate=Ελέγχει πόσο γρήγορα εξαπλώνονται οι πυρκαγιές (0.1x έως 3.0x).

[string-mod-setting]
noct-player-halo-off=Απενεργοποιημένο
noct-player-halo-dark=Σκοτεινό
noct-player-halo-bright=Φωτεινό
noct-vehicle-halo-off=Απενεργοποιημένο
noct-vehicle-halo-dark=Σκοτεινό
noct-vehicle-halo-bright=Φωτεινό

[controls]
noct-flashlight-toggle=Εναλλαγή φακού On/Off