[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Viðbót sem gerir stöðuga nótt og bætir lýsingu á leikmanninum, vopnum hans, ökutækjum, vélum og umhverfinu. Inniheldur margar stillingar til að sérsníða eigin upplifun.

[mod-setting-name]
noct-disable-nightvision=Gera nætursjón óvirka
noct-turn-toward-target=Snúa að skotmarki
noct-hide-enemies-from-map=Fela óvini á korti
noct-default-lamp-color=Sjálfgefin lampalitur
noct-player-halo=Ljóskringla leikmanns
noct-vehicle-halo=Ljóskringlur ökutækja
noct-enhance-machines=Bæta vélar
noct-enhance-explosions=Bæta sprengingar
noct-explosion-light-scale=Stærðarstuðull sprengjuljósa
noct-enhance-projectiles=Bæta skotfæri
noct-enhance-labs=Bæta rannsóknarstofur
noct-enhance-fires=Bæta elda
noct-fire-spread-rate=Margfaldari útbreiðslu elds

[mod-setting-description]
noct-disable-nightvision=Gerir nætursjón áhrifalausa.
noct-turn-toward-target=Þegar þetta er virkt snýr leikmaðurinn sjálfkrafa að einingum sem mús bendir á þegar hann stendur kyrr.
noct-player-halo=Ljósgeisli er festur við leikmanninn til að veita aukið skyggni.
noct-vehicle-halo=Á sama hátt gefa ökutæki einnig frá sér ljós.
noct-enhance-machines=Bætir lýsingu fyrir olíuhreinsunarstöðvar, bræðslur, rafsegulverksmiðjur og fleira.
noct-enhance-explosions=Bætir lýsingu sprenginga vopna og eyðingu bygginga.
noct-explosion-light-scale=Stærðarstillir sprengjuljós (0,5x til 3,0x).
noct-enhance-projectiles=Bætir ljómaslóðum og ljóma við skot og skotfæri.
noct-enhance-labs=Bætir ljósum við rannsóknarstofur þegar þær eru í virkri rannsókn.
noct-enhance-fires=Bætir birtu elda og blikkhegðun þeirra.
noct-fire-spread-rate=Stýrir hversu hratt eldur breiðist út (0,1x til 3,0x).

[string-mod-setting]
noct-player-halo-off=Slökkt
noct-player-halo-dark=Dauf
noct-player-halo-bright=Bjart
noct-vehicle-halo-off=Slökkt
noct-vehicle-halo-dark=Dauf
noct-vehicle-halo-bright=Bjart

[controls]
noct-flashlight-toggle=Kveikja/slökkva á vasaljósi