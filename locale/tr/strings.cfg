[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=Sürekli gece modu oyuncuya, silahlarına, araçlarına, makinelerine ve çevreye yönelik aydınlatma iyileştirmeleri içerir. Kendi deneyiminizi özelleştirebilmeniz için birçok ayar içerir.

[mod-setting-name]
noct-disable-nightvision=Gece Görüşünü Devre Dışı Bırak
noct-turn-toward-target=Hedefe Doğru Dön
noct-hide-enemies-from-map=Düşmanları Haritadan Gizle
noct-default-lamp-color=Varsayılan Lamba Rengi
noct-player-halo=Oyuncu Işığı
noct-vehicle-halo=Araç Spot Işıkları
noct-enhance-machines=Makineleri Geliştir
noct-enhance-explosions=Patlamaları Geliştir
noct-explosion-light-scale=Patlama Işığı Ölçeği
noct-enhance-projectiles=Projeksiyonları Geliştir
noct-enhance-labs=Laboratuvarları Geliştir
noct-enhance-fires=Ateşleri Geliştir
noct-fire-spread-rate=Ateş Yayılma Çarpanı

[mod-setting-description]
noct-disable-nightvision=Gece görüşünün hiçbir etkisi olmamasını sağlar.
noct-turn-toward-target=Etkinleştirildiğinde, oyuncu sabit dururken üzerine gelinen varlıklara doğru otomatik olarak döner.
noct-player-halo=Oyuncuya ek görünürlük sağlayan bir spot ışığı eklenir.
noct-vehicle-halo=Aynı şekilde araçlar da ışık üretir.
noct-enhance-machines=Petrol rafinerileri, dökümhaneler, EM tesisleri ve daha fazlası için aydınlatmayı geliştirir.
noct-enhance-explosions=Silah patlamalarının ve bina yıkımlarının ışıklandırmasını iyileştirir.
noct-explosion-light-scale=Patlama ışıklarının boyutunu ölçekler (0,5x ile 3,0x arası).
noct-enhance-projectiles=Mermilere ve cephaneye izler ve parıltı efektleri ekler.
noct-enhance-labs=Laboratuvarlar araştırma yaparken ışık ekler.
noct-enhance-fires=Ateşlerin parlaklığını ve titreşim davranışını iyileştirir.
noct-fire-spread-rate=Ateşlerin ne kadar hızlı yayıldığını kontrol eder (0,1x ile 3,0x arası).

[string-mod-setting]
noct-player-halo-off=Kapalı
noct-player-halo-dark=Karanlık
noct-player-halo-bright=Parlak
noct-vehicle-halo-off=Kapalı
noct-vehicle-halo-dark=Karanlık
noct-vehicle-halo-bright=Parlak

[controls]
noct-flashlight-toggle=El Fenerini Aç/Kapat