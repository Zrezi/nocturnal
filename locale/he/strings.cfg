[mod-name]
nocturnal=Nocturnal

[mod-description]
nocturnal=מוד לילה קבוע עם שיפורי תאורה לשחקן, לנשקים, לרכבים, למכונות ולסביבה. כולל מגוון הגדרות להתאמה אישית של החוויה שלך.

[mod-setting-name]
noct-disable-nightvision=השבת ראיית לילה
noct-turn-toward-target=פנה לעבר המטרה
noct-hide-enemies-from-map=הסתר אויבים מהמפה
noct-default-lamp-color=צבע מנורה ברירת מחדל
noct-player-halo=זרקור לשחקן
noct-vehicle-halo=זרקורי רכב
noct-enhance-machines=שפר מכונות
noct-enhance-explosions=שפר פיצוצים
noct-explosion-light-scale=קנה מידה של אור פיצוץ
noct-enhance-projectiles=שפר קליעים
noct-enhance-labs=שפר מעבדות
noct-enhance-fires=שפר אש
noct-fire-spread-rate=מכפיל התפשטות אש

[mod-setting-description]
noct-disable-nightvision=גורם לכך שראיית לילה לא תשפיע כלל.
noct-turn-toward-target=כאשר מופעל, השחקן מסתובב אוטומטית לעבר ישויות שהסמן מרחף מעליהן כאשר הוא עומד במקום.
noct-player-halo=זרקור מוצמד לשחקן המספק תוספת ראות.
noct-vehicle-halo=בדומה לכך, רכבים מפיקים אור.
noct-enhance-machines=משפר את התאורה של בתי זיקוק לנפט, מפעלי התכה, מפעלי EM ועוד.
noct-enhance-explosions=משפר את התאורה של פיצוצי נשק והריסת מבנים.
noct-explosion-light-scale=משנה את גודל אורות הפיצוץ (0.5x עד 3.0x).
noct-enhance-projectiles=מוסיף שובל קליע ואפקטי זוהר לקליעים ותחמושת.
noct-enhance-labs=מוסיף תאורה למעבדות כאשר הן מבצעות מחקר פעיל.
noct-enhance-fires=משפר את בהירות האש והתנהגות ההבהוב.
noct-fire-spread-rate=שולט במהירות התפשטות האש (0.1x עד 3.0x).

[string-mod-setting]
noct-player-halo-off=כבוי
noct-player-halo-dark=כהה
noct-player-halo-bright=בהיר
noct-vehicle-halo-off=כבוי
noct-vehicle-halo-dark=כהה
noct-vehicle-halo-bright=בהיר

[controls]
noct-flashlight-toggle=הפעל/כבה פנס